<div class="notas-clinicas-page">
  <!-- Cabecera -->
  <header class="page-header d-flex justify-content-between align-items-center">
    <div class="header-content">
      <h1><span class="icon">📋</span> Historial Clínico</h1>
      <p class="subtitle">Gestión profesional de notas y seguimientos.</p>
    </div>

    <button *ngIf="puedeCrearNota" type="button" class="btn-main" [class.btn-cancel]="mostrarFormulario" (click)="toggleFormulario()">
      <span class="btn-icon">{{ mostrarFormulario ? '✕' : '+' }}</span>
      {{ mostrarFormulario ? 'Cancelar' : 'Nueva nota clínica' }}
    </button>
  </header>

  <!-- FORMULARIO -->
  <section class="nota-form" *ngIf="mostrarFormulario">
  <h3 class="mb-4">{{ notaEditando ? 'Editar Nota' : 'Nueva Nota Clínica' }}</h3>

  <form (ngSubmit)="crearNotaClinica()" class="form-grid">
    <!-- Fila 1: Paciente y Categoría -->
    <label>
      Paciente
      <select [(ngModel)]="nuevaNota.pacienteUid" name="paciente" required>
        <option value="">Seleccione...</option>
        <option *ngFor="let p of pacientes" [value]="p.uid">{{ p.nombre }}</option>
      </select>
    </label>

    <label>
      Categoría
      <input type="text" [(ngModel)]="nuevaNota.categoria" name="categoria" placeholder="Ej: Ansiedad">
    </label>

    <!-- Fila 2: Diagnóstico (Ancho completo) -->
    <label class="full-width">
      Diagnóstico (Máximo 500 caracteres)
      <textarea 
        [(ngModel)]="nuevaNota.diagnostico" 
        name="diagnostico" 
        rows="4" 
        maxlength="500" 
        placeholder="Escriba aquí...">
      </textarea>
      <div class="text-end">
        <small [style.color]="(nuevaNota.diagnostico?.length || 0) >= 500 ? 'red' : '#718096'">
          {{ nuevaNota.diagnostico?.length || 0 }} / 500 caracteres
        </small>
      </div>
    </label>

    <!-- Fila 3: Botón de Guardar (Ancho completo) -->
    <div class="full-width mt-3">
      <button type="submit" class="btn-save" [disabled]="guardando">
        <span *ngIf="!guardando">💾 Guardar Nota Clínica</span>
        <span *ngIf="guardando">⏳ Procesando...</span>
      </button>
    </div>
  </form>
</section>
  <!-- BUSCADOR (Siempre visible fuera del form) -->
  <section class="search-bar">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input [(ngModel)]="filtroTexto" (input)="actualizarFiltro()" type="text" placeholder="Buscar por paciente, diagnóstico o categoría..." />
    </div>
  </section>

  <!-- LISTADO -->
  <div class="info-bar text-center" *ngIf="!cargando && notasFiltradas.length === 0">
    No se encontraron notas clínicas registradas.
  </div>

  <section class="notas-list" *ngIf="!cargando">
    <div class="nota-card-v2" *ngFor="let nota of notasFiltradas">
      <div class="nota-header">
        <strong>{{ nota.pacienteNombre }}</strong>
        <span class="badge">{{ nota.categoria || 'Sin categoría' }}</span>
      </div>
      <div class="nota-field">
        <p>{{ nota.diagnostico }}</p>
      </div>
      <div class="nota-footer">
        <small class="text-muted">{{ formatFecha(nota.fecha) }}</small>
        <div class="nota-actions">
          <button class="btn-circle" (click)="abrirModalDetalle(nota)">👁️</button>
          <button *ngIf="puedeEditarNota(nota)" class="btn-circle" (click)="editarNotaClinica(nota)">✏️</button>
        </div>
      </div>
    </div>
  </section>
</div>
