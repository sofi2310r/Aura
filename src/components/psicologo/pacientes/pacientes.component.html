<div class="pacientes-container">

    <h2>Pacientes</h2>
    <p class="subtitulo">Administra tus pacientes con una vista clara y rápida.</p>

    <!-- BUSCADOR -->
    <div class="card buscador">
        <div class="card-head">
            <h3>Buscar paciente</h3>
            <span class="badge">Filtro</span>
        </div>
        <input 
            type="text" 
            placeholder="Buscar por nombre o correo..."
            [(ngModel)]="buscador"
            (input)="filtrar()"
        />
    </div>

    <!-- LISTA -->
    <div class="card lista">
        <div class="card-head">
            <h3>Listado</h3>
            <span class="badge secondary">{{ pacientesFiltrados.length }} visibles</span>
        </div>

        <div *ngIf="pacientesFiltrados.length === 0" class="empty">
            No hay pacientes
        </div>

        <div *ngFor="let p of pacientesFiltrados" class="paciente-item">

            <div class="info">
                <strong>{{ p.nombre }} {{ p.apellido }}</strong>
                <span>{{ p.correo }}</span>
                <small>{{ p.telefono }}</small>
            </div>

            <div class="acciones">
                <button class="delete" (click)="eliminar(p)">
                    Eliminar
                </button>
            </div>

        </div>

    </div>

</div>
